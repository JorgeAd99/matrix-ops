<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Matrix Ops — Calculadora Matricial</title>
    <meta name="description" content="Operaciones matriciales: inversas, determinantes, transpuestas, multiplicación y más." />
    <!-- Blocking script to prevent theme flash -->
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        var theme = (stored === 'dark' || stored === 'light')
          ? stored
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body style="min-height: 100vh; margin: 0; padding: 0;">
    <div id="root" style="display: flex; flex-direction: column; min-height: 100vh;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
